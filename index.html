<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Athlete's Eye Test — Find Your Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --cream:#F6F2E9; --card:#FFFFFF; --ink:#1B2B23; --muted:#6C7A70; --line:#E6E0D3;
    --green:#1E4636; --green2:#163A2C; --green-soft:#EAF0E9; --green-tint:#CFDCCF; --gold:#B0894B; --gold-soft:#F2E8D4; --gold-l:#E7C886;
    --sans:'Mulish',-apple-system,system-ui,sans-serif; --disp:'Lora',Georgia,serif; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink);background:#e9e3d6;display:grid;place-items:center;min-height:100dvh}
  .app{position:relative;width:100%;max-width:440px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;background:radial-gradient(120% 50% at 50% -5%,#fbf8f1,transparent 60%),var(--cream);overflow:hidden}
  @media (min-width:780px){ body{padding:22px} .app{height:min(900px,94dvh);border-radius:34px;box-shadow:0 50px 100px -34px rgba(20,40,30,.45);border:1px solid #e7e1d4} }
  .top{display:flex;align-items:center;gap:10px;padding:calc(13px + env(safe-area-inset-top)) 16px 8px;flex:0 0 auto}
  .navback{flex:0 0 auto;display:inline-flex;align-items:center;gap:4px;height:34px;padding:0 13px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);color:var(--green);font-family:var(--sans);font-weight:700;font-size:13.5px;cursor:pointer;visibility:hidden;transition:.15s}
  .navback.show{visibility:visible}.navback:active{background:var(--green-soft)}
  .brand{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;font-weight:800;letter-spacing:.12em;font-size:11px;text-transform:uppercase;color:var(--muted)}
  .scorechip{flex:0 0 auto;display:flex;align-items:center;gap:6px;font-weight:800;font-size:12px;color:var(--green);background:var(--green-soft);border:1px solid var(--green-tint);padding:5px 11px;border-radius:999px;transition:opacity .3s}
  .scorechip .dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
  .progress{height:4px;margin:6px 16px 0;background:#e7e1d4;border-radius:9px;overflow:hidden;flex:0 0 auto}
  .progress>i{display:block;height:100%;width:4%;border-radius:9px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .55s cubic-bezier(.2,.8,.2,1)}
  .stage{position:relative;flex:1;min-height:0;display:flex}
  .screen{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;padding:16px 20px calc(22px + env(safe-area-inset-bottom));opacity:1;transition:opacity .26s ease}
  .screen.out{opacity:0}
  .eyebrow{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:12px;flex:0 0 auto}
  h1{font-family:var(--disp);font-weight:600;font-size:clamp(27px,7.9vw,33px);line-height:1.1;color:var(--green2);flex:0 0 auto}
  h1 .it{font-style:italic;color:var(--gold)}
  .lede{color:#4d5b52;font-size:16px;line-height:1.55;margin-top:11px;flex:0 0 auto}
  .hint-pill{display:inline-block;margin-top:12px;font-size:12px;font-weight:700;color:var(--green);background:var(--green-soft);border:1px solid var(--green-tint);padding:5px 12px;border-radius:999px;flex:0 0 auto;align-self:flex-start}
  .spacer{flex:1 1 auto;min-height:14px}
  .btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);font-weight:700;font-size:16.5px;padding:16px 20px;border-radius:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--green);color:#f3efe4;transition:transform .12s,filter .2s;flex:0 0 auto;box-shadow:0 10px 22px -12px rgba(30,70,54,.6)}
  .btn:active{transform:scale(.985)}.btn:hover{filter:brightness(1.06)}.btn[disabled]{opacity:.42;box-shadow:none}
  .btn.ghost{background:transparent;color:var(--green);border:1.5px solid var(--green-tint);box-shadow:none}
  .btn .arrow{font-size:19px}
  .meta{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;margin-top:12px;flex:0 0 auto;text-align:center}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:p 1.9s infinite;flex:0 0 auto}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(176,137,75,.45)}70%{box-shadow:0 0 0 9px rgba(176,137,75,0)}100%{box-shadow:0 0 0 0 rgba(176,137,75,0)}}
  .cards{display:flex;flex-direction:column;gap:11px;margin-top:16px;flex:0 0 auto}
  .card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:15px;cursor:pointer;background:var(--card);border:1.5px solid var(--line);transition:.15s}
  .card:active{transform:scale(.99)}.card.sel{border-color:var(--green);background:var(--green-soft)}
  .card .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;background:var(--cream);border:1px solid var(--line);flex:0 0 auto}
  .card .tt{font-weight:700;font-size:16.5px;color:var(--ink)}.card .ss{color:var(--muted);font-size:12.5px;margin-top:2px}
  .card .chk{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;flex:0 0 auto;color:#fff}
  .card.sel .chk{border-color:var(--green);background:var(--green);font-weight:900;font-size:13px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:16px;flex:0 0 auto}
  .tile{padding:16px 14px;border-radius:15px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;transition:.15s;text-align:left}
  .tile:active{transform:scale(.99)}.tile.sel{border-color:var(--green);background:var(--green-soft)}
  .tile b{font-family:var(--disp);font-size:21px;font-weight:600;display:block;color:var(--green2)}.tile span{color:var(--muted);font-size:11.5px}
  .chips{display:flex;flex-direction:column;gap:9px;margin-top:16px;flex:0 0 auto}
  .chip{padding:14px 16px;border-radius:13px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;font-weight:600;font-size:14.5px;transition:.15s;display:flex;align-items:center;gap:12px;color:var(--ink)}
  .chip:active{transform:scale(.99)}.chip.sel{background:var(--green-soft);border-color:var(--green)}
  .chip .radio{width:20px;height:20px;border-radius:50%;border:2px solid #c9c2b2;flex:0 0 auto}.chip.sel .radio{border-color:var(--green);box-shadow:inset 0 0 0 4px var(--green)}
  .chip .e{font-size:18px;flex:0 0 auto}
  .opts{display:flex;flex-direction:column;gap:9px;margin-top:14px;flex:0 0 auto}
  .opt{display:flex;align-items:center;gap:13px;padding:14px 15px;border-radius:13px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;font-weight:600;font-size:15px;color:var(--ink);transition:.15s}
  .opt:active{transform:scale(.99)}.opt.sel{border-color:var(--green);background:var(--green-soft)}
  .opt .cbx{width:24px;height:24px;border-radius:7px;border:2px solid #c9c2b2;display:grid;place-items:center;color:#fff;font-weight:900;font-size:14px;flex:0 0 auto;transition:.12s}
  .opt.sel .cbx{background:var(--green);border-color:var(--green)}
  .otherfield{display:none;margin-top:11px;flex:0 0 auto}
  .otherfield input{width:100%;padding:14px;border-radius:13px;background:var(--card);border:1.5px solid var(--green-tint);color:var(--ink);font-family:var(--sans);font-size:16px;font-weight:600}
  .otherfield input:focus{outline:none;border-color:var(--green)}
  .surface{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-top:14px;padding:20px 16px;flex:0 0 auto}
  .acuity-row,.near-row{display:block;width:100%;text-align:center;color:#13211a;cursor:pointer;padding:9px 4px;border-radius:10px;transition:.12s;font-weight:700;letter-spacing:.18em}
  .acuity-row:active,.near-row:active{background:var(--green-soft)}.acuity-row.sel,.near-row.sel{background:var(--green-soft);outline:1.5px solid var(--green)}
  .near-row{font-family:var(--disp);font-weight:500;letter-spacing:normal;line-height:1.25}
  .rowtag{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.1em}
  .arena{position:relative;height:250px;border-radius:18px;margin:14px 0;overflow:hidden;display:grid;place-items:center;flex:0 0 auto;background:radial-gradient(95% 130% at 50% 0,#eef3ee,#dde7de);border:1px solid var(--line)}
  .arena .net{position:absolute;left:0;right:0;top:50%;height:2px;background:repeating-linear-gradient(90deg,#b7c4b8 0 8px,transparent 8px 16px)}
  .gball{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff7d8,var(--gold) 55%,#94702f);box-shadow:0 8px 20px rgba(120,90,40,.4);will-change:filter,transform,opacity}
  .arena.golf{background:linear-gradient(180deg,#d4e8cb 0%,#a9d49a 64%,#8cc47c 100%)}
  .g-flag{position:absolute;left:16px;right:16px;top:40px;display:flex;align-items:center;gap:7px;transition:top .15s}
  .g-flag .g-line{flex:1;height:0;border-top:2px dashed rgba(18,45,28,.5)}
  .g-flag .g-pin{font-size:21px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2))}
  .g-marker{position:absolute;left:16px;right:16px;top:50%;height:5px;border-radius:3px;background:var(--gold);box-shadow:0 1px 4px rgba(120,90,40,.5)}
  .g-marker .g-mlabel{position:absolute;right:0;top:-15px;font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--green2)}
  .g-yard{position:absolute;top:9px;right:11px;font-family:var(--disp);font-size:17px;font-weight:600;color:var(--green2);background:rgba(255,255,255,.72);padding:2px 9px;border-radius:9px}
  .arena.serve{background:radial-gradient(100% 80% at 50% -10%,#bfe0c6,#7eb88b 90%)}
  .arena.serve::before{content:"";position:absolute;left:50%;top:0;bottom:54px;width:2px;transform:translateX(-50%);background:repeating-linear-gradient(180deg,rgba(255,255,255,.55) 0 10px,transparent 10px 20px)}
  .sv-line{position:absolute;left:0;right:0;bottom:54px;height:2px;background:rgba(18,45,28,.55)}
  .sv-line span{position:absolute;right:11px;top:-15px;font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--green2)}
  .svball{width:18px;height:18px;left:50%;top:24px;transform:translateX(-50%);position:absolute;background:radial-gradient(circle at 35% 30%,#f3ff9e,#cde85a 55%,#9bb53a);box-shadow:0 4px 12px rgba(120,140,40,.45)}
  .arena.fence{background:radial-gradient(95% 130% at 50% 0,#f2f5ef,#e2e8df);display:block}
  .fence-rows{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-around;padding:30px 14px}
  .fline{position:relative;width:30px;height:172px;display:flex;flex-direction:column;align-items:center;cursor:pointer}
  .fline .seg{width:3px;background:var(--green2);border-radius:2px;display:block}
  .fline .seg.top{height:80px}
  .fline .seg.bot{height:80px;margin-top:8px}
  .fline:active{opacity:.55}
  .hy-lvl{position:absolute;top:9px;right:11px;font-size:10.5px;font-weight:800;letter-spacing:.04em;color:var(--green2);background:rgba(255,255,255,.72);padding:3px 9px;border-radius:9px}
  .tovl{position:absolute;inset:0;display:grid;place-items:center;background:rgba(238,243,238,.93);backdrop-filter:blur(2px);padding:18px;text-align:center}
  .ovl-card{max-width:300px}
  .ovl-t{font-family:var(--disp);font-size:20px;font-weight:600;color:var(--green2);margin-bottom:7px}
  .ovl-card p{font-size:13.5px;color:#46544b;line-height:1.45;margin-bottom:14px}
  .ovl-s{font-family:var(--disp);font-size:46px;font-weight:600;color:var(--green2);line-height:1}
  .ovl-l{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:4px 0 8px}
  .cd-l{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:6px}
  .cd{font-family:var(--disp);font-weight:600;font-size:74px;line-height:1;color:var(--green2);animation:cdpop .62s cubic-bezier(.2,.9,.3,1)}
  .cd.go{font-size:34px;letter-spacing:.04em}
  @keyframes cdpop{0%{transform:scale(.45);opacity:0}45%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}
  .field{margin-top:14px;flex:0 0 auto}
  .field label{display:block;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:7px}
  .field input{width:100%;padding:15px;border-radius:13px;background:var(--card);border:1.5px solid var(--line);color:var(--ink);font-family:var(--sans);font-size:16px;font-weight:600}
  .field input:focus{outline:none;border-color:var(--green)}
  .reassure{display:flex;gap:9px;align-items:flex-start;color:var(--muted);font-size:12.5px;margin-top:13px;line-height:1.45;flex:0 0 auto}.reassure b{color:#3a4842}
  .ring-wrap{display:grid;place-items:center;margin:4px 0 2px;flex:0 0 auto}
  .ring{position:relative;width:170px;height:170px}.ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .ring .num b{font-family:var(--disp);font-size:52px;font-weight:600;line-height:1;color:var(--green2)}
  .ring .num span{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-top:5px;font-weight:800}
  .acu-est{text-align:center;margin-top:4px;flex:0 0 auto;font-size:13px;color:var(--muted)}.acu-est b{color:var(--green2);font-family:var(--disp)}
  .bars{margin-top:16px;display:flex;flex-direction:column;gap:13px;flex:0 0 auto}
  .bar .bl{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:6px}.bar .bl span{color:var(--muted);font-weight:600}
  .track{position:relative;height:9px;border-radius:6px;background:#e7e1d4;overflow:visible}
  .track>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--green),var(--gold));width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .track .pk{position:absolute;top:-3px;width:2px;height:15px;background:var(--green2);border-radius:2px;opacity:.55}
  .barnote{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.4}
  .path{margin-top:18px;padding:18px;border-radius:18px;flex:0 0 auto}
  .path .tag{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;padding:5px 11px;border-radius:999px;margin-bottom:11px}
  .path .t{font-family:var(--disp);font-style:italic;font-size:20px;color:var(--green2);line-height:1.18;margin-bottom:7px}
  .path p{font-size:14px;color:#3a4842;line-height:1.52}
  .docbox{margin-top:16px;border:1px dashed var(--green-tint);border-radius:16px;background:var(--green-soft);padding:16px;flex:0 0 auto}
  .docbox .h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
  .docbox ul{list-style:none;display:grid;gap:7px}.docbox li{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:#33433b}.docbox li b{color:var(--green2);font-weight:700;text-align:right}
  .cta-prac{text-align:center;color:var(--muted);font-size:12.5px;margin-top:11px;flex:0 0 auto}.cta-prac b{color:var(--ink)}
  .discbox{margin-top:16px;padding:13px 15px;border:1px solid var(--line);border-radius:12px;background:#fbfaf6;color:#6b7268;font-size:11.5px;line-height:1.5;flex:0 0 auto}.discbox b{color:#3a4842;font-weight:700}
  .disc{text-align:center;color:#9a937f;font-size:10.5px;margin-top:10px;flex:0 0 auto}
  .feedback{position:absolute;inset:0;display:grid;place-items:center;z-index:7;opacity:0;pointer-events:none;transition:opacity .3s}
  .feedback.on{opacity:1}
  .feedback .fb{background:rgba(27,43,35,.93);color:#f2efe5;border-radius:18px;padding:22px 28px;text-align:center;max-width:80%;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
  .feedback .fb .big{font-family:var(--disp);font-size:26px;color:#fff;font-weight:600}.feedback .fb .sm{color:#cdd6cd;font-size:13.5px;margin-top:5px}
  .hero{position:relative;flex:0 0 auto;overflow:hidden;background:#162a20;border-radius:20px;box-shadow:0 18px 34px -20px rgba(20,40,30,.55)}
  .hero img{display:block;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0;transition:opacity .6s ease}
  .hero img.on{opacity:1}
  .hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,24,18,.10) 0%,rgba(13,24,18,.50) 58%,rgba(13,24,18,.88) 100%)}
  .hero .cap{position:absolute;left:0;right:0;bottom:0;padding:17px 18px;color:#f5f1e6;z-index:2}
  .hero .cap .eye{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--gold-l);margin-bottom:8px}
  .hero .cap .ttl{font-family:var(--disp);font-weight:600;font-size:clamp(25px,7.2vw,32px);line-height:1.08;color:#fff}
  .hero .cap .ttl .it{font-style:italic;color:var(--gold-l)}
  .hero .cap .ln{font-family:var(--disp);font-style:italic;font-size:16.5px;line-height:1.28;color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.45)}
  .hero.intro{height:clamp(240px,40vh,310px);margin-top:2px}
  .hero.band{height:118px;margin-top:14px}
  .hero.report{height:150px;margin-bottom:2px}
  .benefits{display:flex;flex-direction:column;gap:10px;margin-top:16px;flex:0 0 auto}
  .benefit{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border-radius:13px;background:var(--card);border:1px solid var(--line)}
  .benefit .bicon{flex:0 0 auto;width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:17px;background:var(--green-soft);border:1px solid var(--green-tint)}
  .benefit .btxt{font-size:13.5px;color:#3a4842;line-height:1.4}
  .benefit .btxt b{color:var(--green2);font-weight:700}
  .card .thumb{width:54px;height:54px;border-radius:13px;flex:0 0 auto;background:#dfe6df center/cover no-repeat;border:1px solid var(--line);box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
  .method{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;margin-top:11px;flex:0 0 auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;font-weight:600;letter-spacing:.02em;color:#5d6b61;background:var(--card);border:1px solid var(--line);padding:5px 11px;border-radius:8px;text-transform:uppercase}
  .method .md{width:6px;height:6px;border-radius:2px;background:var(--green);flex:0 0 auto}
  .calwrap{margin-top:18px;display:flex;justify-content:center;flex:0 0 auto}
  .calcard{position:relative;height:148px;width:236px;border-radius:13px;background:linear-gradient(135deg,#1f4a39,#2b6048);box-shadow:0 14px 28px -14px rgba(20,50,35,.6);overflow:hidden;transition:width .04s linear}
  .calcard .calstripe{position:absolute;left:0;right:0;top:26px;height:30px;background:rgba(0,0,0,.28)}
  .calcard .calchip{position:absolute;left:18px;top:70px;width:38px;height:28px;border-radius:6px;background:linear-gradient(135deg,#e7c886,#b0894b)}
  .calcard .caltxt{position:absolute;left:18px;right:14px;bottom:14px;color:rgba(255,255,255,.92);font-size:11.5px;font-weight:700;letter-spacing:.02em}
  .calslider{-webkit-appearance:none;appearance:none;width:100%;height:6px;margin-top:18px;border-radius:6px;background:#dcd5c5;outline:none;flex:0 0 auto}
  .calslider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--green);border:3px solid #fff;box-shadow:0 3px 8px rgba(20,50,35,.4);cursor:pointer}
  .calslider::-moz-range-thumb{width:28px;height:28px;border:3px solid #fff;border-radius:50%;background:var(--green);cursor:pointer}
  .callabel{margin-top:10px;font-size:12.5px;color:var(--muted);line-height:1.45;flex:0 0 auto}
  .calsteps{margin-top:16px;display:flex;flex-direction:column;gap:9px;flex:0 0 auto}
  .calstep{display:flex;align-items:center;gap:12px;font-size:13.5px;color:#3a4842;font-weight:600;line-height:1.35}
  .calstep .cn{flex:0 0 auto;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--green-soft);border:1px solid var(--green-tint);color:var(--green);font-weight:800;font-size:12px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .stagger>*{opacity:0;animation:rise .5s forwards}
  .stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.1s}.stagger>*:nth-child(3){animation-delay:.17s}
  .stagger>*:nth-child(4){animation-delay:.24s}.stagger>*:nth-child(5){animation-delay:.31s}.stagger>*:nth-child(6){animation-delay:.38s}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <button class="navback" id="back">&#8249; Back</button>
    <div class="brand">Athlete&rsquo;s Eye Test</div>
    <div class="scorechip" id="chip" style="opacity:0"><span class="dot"></span><span id="chipval">0</span> pts</div>
  </div>
  <div class="progress"><i id="bar"></i></div>
  <div class="stage"><div class="screen" id="screen"></div></div>
  <div class="feedback" id="feedback"><div class="fb"><div class="big" id="fbbig"></div><div class="sm" id="fbsm"></div></div></div>
</div>

<script>
const state={ sport:null, sportOther:'', skill:null, age:null, pain:null, painOther:'', acuity:null, reaction:0, contrast:0, near:null, hyper:0, calPx:236, cal:null, context:[], club:'', name:'', email:'' };
let step=0; const TOTAL=15;
const screenEl=document.getElementById('screen'), bar=document.getElementById('bar'),
      chip=document.getElementById('chip'), chipval=document.getElementById('chipval'), back=document.getElementById('back');

const U='https://images.unsplash.com/photo-';
function img(id,w,q){ return U+id+'?w='+(w||760)+'&q='+(q||62)+'&auto=format&fit=crop'; }
const IMG={
  neutral:'1431324155629-1a6deb1dec8d', // stadium under the lights
  golfHero:'1535131749006-b7f58c99034b', golfAlt:'1587174486073-ae5e5cff23aa',
  tennisHero:'1622279457486-62dcc4a431d6', tennisAlt:'1554068865-24cecd4e34b8',
  pickleHero:'1734161081396-0f0572a16bf6', pickleAlt:'1693142518820-78d7a05f1546',
  otherHero:'1431324155629-1a6deb1dec8d'
};

const SPORTS={
  Pickleball:{ic:'&#127952;',ss:'Fast hands, quick reads',verb:'put-away',readNoun:'the ball off the paddle',nearEx:'the score scrawled on a paddle',
    bragQ:'What&rsquo;s your <span class="it">DUPR</span>?',brag:['Under 3.0','3.0 to 3.5','3.5 to 4.0','4.0 and up','Just here for fun'],flatter:'A real competitor.',
    hero:IMG.pickleHero,thumb:IMG.pickleAlt,unit:'points',arena:'the kitchen line',pro:'A pro at the net',heroLine:'A split-second delay at the net costs more than you think.',readMetric:'Net reaction',readNote:'How quickly you react to fast volleys.'},
  Golf:{ic:'&#9971;',ss:'Distance and depth',verb:'putt',readNoun:'the flag from the fairway',nearEx:'the yardage on a rangefinder',
    bragQ:'What do you <span class="it">shoot</span>?',brag:['Under 80','In the 80s','In the 90s','Triple digits','Out for the walk'],flatter:'Single digits is no accident.',
    hero:IMG.golfHero,thumb:IMG.golfHero,unit:'strokes',arena:'the fairway',pro:'A tour pro',heroLine:'Misjudging a green is a stroke you never get back.',readMetric:'Distance judgment',readNote:'How accurately you judge depth and distance.'},
  Tennis:{ic:'&#127934;',ss:'Speed and tracking',verb:'return',readNoun:'a ball with pace',nearEx:'the tension stamped on a racquet',
    bragQ:'What&rsquo;s your <span class="it">level</span>?',brag:['3.0','3.5','4.0','4.5 and up','I just rally'],flatter:'That is tournament territory.',
    hero:IMG.tennisHero,thumb:IMG.tennisHero,unit:'points',arena:'the baseline',pro:'A touring pro',heroLine:'Picking up a serve late changes the entire point.',readMetric:'Serve tracking',readNote:'How quickly you lock onto a fast serve.'},
  Other:{ic:'&#127950;',ss:'General vision fitness',verb:'play',readNoun:'a fast-moving target',nearEx:'the fine print',
    bragQ:'How <span class="it">active</span> are you?',brag:['I play to win','Weekend warrior','Social and casual','Just staying active'],flatter:'Respect.',
    hero:IMG.otherHero,thumb:IMG.otherHero,unit:'points',arena:'the field',pro:'An elite competitor',heroLine:'Your eyes slow down before your body does.',readMetric:'Visual reaction',readNote:'How quickly your eyes track and respond.'}
};
function SP(){ return SPORTS[state.sport]||SPORTS.Other; }
function sportName(){ return state.sport==='Other'?(state.sportOther||'your game'):(state.sport||'your game'); }

const ACUITY=[['20/100','E',58],['20/70','F P',43],['20/50','T O Z',33],['20/40','L P E D',26],['20/30','P E C F D',20],['20/25','E D F C Z P',15],['20/20','F E L O P Z D',11],['20/15','D E F P O T E C',8]];
function nearRows(){ return [['Easy',SP().nearEx,26],['Comfortable','a note from the pro shop',20],['Average','the fine print on a card',15],['Sharp','small settings and labels',12],['Excellent','the disclaimer on a pill bottle',10]]; }
const AGE=[['Under 40','Still in my prime',92],['40s','Peak experience',88],['50s','Sharper every season',82],['60s','Seasoned competitor',74],['70+','Ageless',66]];
const SYM_BY_SPORT={
  Pickleball:[['&#127934;','Fast hands at the net blur on me','dynamic'],['&#128167;','Contacts dry out on the court','refractive'],
    ['&#128083;','I react a beat late at the kitchen','dynamic'],['&#128214;','Reading the score or my phone up close','near'],
    ['&#127769;','Glare or halos driving at night','glare'],['&#128161;','Indoor or low light kills my read','glare'],['&#10133;','Something else','other']],
  Golf:[['&#127934;','I lose the ball against the sky off the tee','dynamic'],['&#128167;','Eyes dry out on a windy round','refractive'],
    ['&#128083;','I can&rsquo;t follow ball flight like I used to','dynamic'],['&#128214;','Reading the scorecard or yardage book','near'],
    ['&#127769;','Glare or halos driving home at night','glare'],['&#128161;','Dusk light kills my read of the green','glare'],['&#10133;','Something else','other']],
  Tennis:[['&#127934;','I misjudge a ball with real pace','dynamic'],['&#128167;','Contacts dry out in sun and wind','refractive'],
    ['&#128083;','I pick up the serve a beat late','dynamic'],['&#128214;','Reading the draw sheet or my phone up close','near'],
    ['&#127769;','Glare or halos driving at night','glare'],['&#128161;','Indoor or low light kills my read','glare'],['&#10133;','Something else','other']],
  Other:[['&#127934;','Things blur when I need them sharp','refractive'],['&#128167;','Eyes dry out when I play','refractive'],
    ['&#128083;','I track fast movement a beat late','dynamic'],['&#128214;','Reading small print up close','near'],
    ['&#127769;','Glare or halos driving at night','glare'],['&#128161;','Low light kills my read','glare'],['&#10133;','Something else','other']]
};
function SYM(){ return SYM_BY_SPORT[state.sport]||SYM_BY_SPORT.Other; }
const CONTEXT=['I wear glasses, contacts, or readers','I&rsquo;ve had eye surgery before','Diabetes or glaucoma in my history','Dry or irritated eyes','None of these'];

function acuityScore(){ return state.acuity==null?0:[48,57,66,75,83,90,96,99][state.acuity]; }
function nearScore(){ return state.near==null?0:[58,68,78,88,96][state.near]; }
function totalScore(){ const v=[acuityScore(),state.reaction,state.contrast,nearScore(),state.hyper].filter(x=>x>0); return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0; }
function ageAvg(){ const a=AGE.find(x=>x[0]===state.age); return a?a[2]:80; }
function symKind(){ return (SYM().find(x=>x[1]===state.pain)||[])[2]; }

function animateChip(){ chip.style.opacity=(state.acuity!=null||state.reaction||state.contrast||state.near!=null||state.hyper)?'1':'0'; const t=totalScore(); let c=parseInt(chipval.textContent)||0;
  const iv=setInterval(()=>{c+=Math.max(1,Math.round((t-c)/6));if(c>=t){c=t;clearInterval(iv);}chipval.textContent=c;},28); }
function setBar(){ bar.style.width=Math.max(4,(step/(TOTAL-1))*100)+'%'; }
function flash(big,sm,cb){ const f=document.getElementById('feedback');document.getElementById('fbbig').textContent=big;document.getElementById('fbsm').textContent=sm;
  f.classList.add('on');setTimeout(()=>{f.classList.remove('on');cb&&cb();},1050); }
function next(){ if(step<TOTAL-1){step++;render();} }
back.onclick=()=>{ if(step>0){step--;render();} };

function updateContinue(){ const btn=screenEl.querySelector('button.btn:not(.ghost)'); if(!btn)return; let ok=true; if(step===11) ok=state.context.length>0; btn.disabled=!ok; }
function selSingle(el,key,value){ state[key]=value;
  const box=el.parentElement; Array.from(box.children).forEach(c=>{ c.classList.remove('sel'); const k=c.querySelector('.chk'); if(k)k.innerHTML=''; });
  el.classList.add('sel'); const k=el.querySelector('.chk'); if(k)k.innerHTML='&#10003;';
  const of=screenEl.querySelector('.otherfield'); if(of) of.style.display=el.dataset.other?'block':'none';
  updateContinue(); }
function toggleCtx(i){ if(i===4){ state.context=state.context.includes(4)?[]:[4]; } else { state.context=state.context.filter(x=>x!==4); const at=state.context.indexOf(i); if(at>-1)state.context.splice(at,1); else state.context.push(i); }
  const box=document.querySelector('.opts'); if(box){ Array.from(box.children).forEach((c,idx)=>{ const on=state.context.includes(idx); c.classList.toggle('sel',on); const cb=c.querySelector('.cbx'); if(cb)cb.innerHTML=on?'&#10003;':''; }); } updateContinue(); }

const FOCUS={ refractive:{line:'distance sharpness and astigmatism',clinical:'Refractive evaluation'},
  near:{line:'up-close reading vision',clinical:'Near-vision and lens evaluation'}, contrast:{line:'low-light contrast',clinical:'Contrast and lens-health evaluation'} };
function focusKind(){ const a=state.age,k=symKind(); const nearWeak=(state.near!=null&&state.near<=2), contrastWeak=(state.contrast>0&&state.contrast<76);
  if((a==='60s'||a==='70+')&&(contrastWeak||k==='glare')) return 'contrast';
  if((a==='50s'||a==='60s'||a==='70+')&&(nearWeak||k==='near')) return 'near'; return 'refractive'; }
function isCandidate(){ if(state.context.includes(0)) return true; if(totalScore()<Math.min(ageAvg(),78)) return true;
  if(state.near!=null&&state.near<=1) return true; if(state.contrast>0&&state.contrast<70) return true; if(state.acuity!=null&&state.acuity<=1) return true;
  if(state.hyper>0&&state.hyper<70) return true; return false; }
function correction(){ return state.context.includes(0)?'glasses / contacts / readers':'none'; }
function ctxFlags(){ const f=[]; if(state.context.includes(1))f.push('prior eye surgery'); if(state.context.includes(2))f.push('diabetes/glaucoma hx'); if(state.context.includes(3))f.push('dry eye'); return f.length?f.join(', '):'none flagged'; }

const screens=[];

screens[0]=()=>`<div class="stagger">
  <div class="hero intro"><img src="${img(IMG.neutral,820,64)}" alt="" onload="this.classList.add('on')"/><div class="scrim"></div>
    <div class="cap"><div class="eye">Free &middot; 3 minutes &middot; personalized results</div><div class="ttl">How sharp are<br>your eyes, <span class="it">really?</span></div></div></div>
  <div class="lede" style="margin-top:14px">Take five quick vision screens and get a personalized report showing where your eyes are strong, where they&rsquo;ve changed, and what a specialist would focus on.</div>
  <div class="benefits">
    <div class="benefit"><div class="bicon">&midast;</div><div class="btxt"><b>Five clinical-grade screens</b><br>Distance, reaction, contrast, near vision, and precision</div></div>
    <div class="benefit"><div class="bicon">&equiv;</div><div class="btxt"><b>Personalized scouting report</b><br>Benchmarked against your age and sport</div></div>
    <div class="benefit"><div class="bicon">&check;</div><div class="btxt"><b>Free in-office follow-up</b><br>With a vision specialist near you, if your results call for it</div></div>
  </div>
  <div class="spacer"></div>
  <button class="btn" onclick="next()">Start my vision check <span class="arrow">&rarr;</span></button>
  <div class="meta"><span class="pulse"></span> Built on clinical screening methods &middot; no commitment</div>
  <div class="meta" style="margin-top:6px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#9a937f">Powered by Dancecard</div></div>`;

screens[1]=()=>{ const o=Object.keys(SPORTS).map(k=>[k,SPORTS[k]]);
  return `<div class="stagger"><div class="eyebrow">Your sport</div><h1>What&rsquo;s your<br><span class="it">sport?</span></h1>
  <div class="lede" style="margin-top:8px">We&rsquo;ll tailor each screen to how you play.</div>
  <div class="cards">${o.map(([k,c])=>`<div class="card ${state.sport===k?'sel':''}" data-other="${k==='Other'?1:''}" onclick="selSingle(this,'sport','${k}')"><div class="thumb" style="background-image:url('${img(c.thumb,150,55)}')"></div><div><div class="tt">${k==='Other'?'Another sport':k}</div><div class="ss">${c.ss}</div></div><div class="chk">${state.sport===k?'&#10003;':''}</div></div>`).join('')}</div>
  <div class="otherfield" style="display:${state.sport==='Other'?'block':'none'}"><input placeholder="Your sport" value="${state.sportOther}" oninput="state.sportOther=this.value"/></div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.sport?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`; };

screens[2]=()=>{ const c=SP();
  return `<div class="stagger"><div class="eyebrow">Your level</div><h1>${c.bragQ}</h1>
  <div class="hero band"><img src="${img(c.hero,760,62)}" alt="" onload="this.classList.add('on')"/><div class="scrim"></div>
    <div class="cap"><div class="ln">No judgment. This helps us benchmark your results.</div></div></div>
  <div class="lede" style="margin-top:12px">We&rsquo;ll compare your scores to players at a similar level.</div>
  <div class="chips">${c.brag.map(b=>`<div class="chip ${state.skill===b?'sel':''}" onclick="pickSkill(this,'${b}')"><span class="radio"></span>${b}</div>`).join('')}</div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.skill?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`; };
function pickSkill(el,b){ selSingle(el,'skill',b); const i=SP().brag.indexOf(b); if(i<=1) flash('Nice.', SP().flatter, null); }

screens[3]=()=>`<div class="stagger"><div class="eyebrow">Your age range</div><h1>Which decade<br>are you <span class="it">in?</span></h1>
  <div class="lede" style="margin-top:8px">So we compare your results to the right baseline.</div>
  <div class="grid2">${AGE.map(a=>`<div class="tile ${state.age===a[0]?'sel':''}" onclick="selSingle(this,'age','${a[0]}')"><b>${a[0]}</b><span>${a[1]}</span></div>`).join('')}</div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.age?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;

screens[4]=()=>`<div class="stagger"><div class="eyebrow">Your experience</div><h1>Notice anything<br><span class="it">like this?</span></h1>
  <div class="lede" style="margin-top:8px">Pick the one closest to what you&rsquo;ve experienced.</div>
  <div class="chips">${SYM().map((p,i)=>`<div class="chip ${state.pain===p[1]?'sel':''}" data-other="${p[2]==='other'?1:''}" onclick="selSingle(this,'pain',SYM()[${i}][1])"><span class="radio"></span><span class="e">${p[0]}</span>${p[1]}</div>`).join('')}</div>
  <div class="otherfield" style="display:${symKind()==='other'?'block':'none'}"><input placeholder="Tell us in a few words" value="${state.painOther}" oninput="state.painOther=this.value"/></div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.pain?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;

/* Setup & calibration (clinical credibility gate) */
screens[5]=()=>`<div class="stagger"><div class="eyebrow">Quick setup</div><h1>Let&rsquo;s make it<br><span class="it">accurate.</span></h1>
  <div class="lede" style="margin-top:8px">We&rsquo;ll calibrate to your screen first so the measurements are accurate. Takes about 15 seconds.</div>
  <div class="method"><span class="md"></span>ISO/IEC 7810 card calibration</div>
  <div class="calwrap"><div class="calcard" id="calcard" style="width:${state.calPx}px"><span class="calstripe"></span><span class="calchip"></span><span class="caltxt">Match a card to this width</span></div></div>
  <input type="range" min="150" max="330" value="${state.calPx}" class="calslider" oninput="calAdjust(this.value)"/>
  <div class="callabel">Hold any credit or membership card to the screen and slide until the bar matches its long edge.</div>
  <div class="calsteps">
    <div class="calstep"><span class="cn">1</span><span>Hold your phone at arm&rsquo;s length and keep it there</span></div>
    <div class="calstep"><span class="cn">2</span><span>Cover your left eye when a test begins, then switch</span></div>
    <div class="calstep"><span class="cn">3</span><span>Turn screen brightness to full</span></div>
  </div>
  <div class="spacer"></div>
  <button class="btn" onclick="setCal()">I&rsquo;m calibrated <span class="arrow">&rarr;</span></button>
  <div class="meta">Standard card long edge: 85.6 mm</div></div>`;
function calAdjust(v){ state.calPx=+v; const c=document.getElementById('calcard'); if(c) c.style.width=v+'px'; }
function setCal(){ state.cal=(state.calPx/85.6).toFixed(2); next(); }

screens[6]=()=>`<div class="stagger"><div class="eyebrow">Test 1 of 5 &middot; Distance vision</div><h1>How far can you<br>still <span class="it">read?</span></h1>
  <div class="lede" style="margin-top:6px">Cover your left eye. Hold your phone at arm&rsquo;s length. Tap the smallest row where you can read every letter clearly.</div>
  <div class="method"><span class="md"></span>Snellen optotype &middot; logMAR acuity${state.cal?' &middot; calibrated':''}</div>
  <div class="surface">${ACUITY.map((r,i)=>`<div class="acuity-row ${state.acuity===i?'sel':''}" style="font-size:${r[2]}px" onclick="setAcuity(${i})">${r[1]}<div class="rowtag">${r[0]}</div></div>`).join('')}</div>
  <div class="meta">Estimates your distance acuity &middot; tap your line</div></div>`;
function setAcuity(i){ state.acuity=i; animateChip(); flash('Distance: '+ACUITY[i][0], i>=6?'Sharp. 20/20 or better.':'Good read, room to sharpen.', next); }

/* T2 reaction (modal + 3 tries, slower) */
screens[7]=()=>{ const s=state.sport;
  if(s==='Golf') return golfScreen();
  if(s==='Tennis'||s==='Pickleball') return serveScreen();
  return genScreen(); };
function readInit(){ const s=state.sport;
  if(s==='Golf') return grInit();
  if(s==='Tennis'||s==='Pickleball') return svInit();
  return reactInit(); }

/* generic read (Other) */
function genScreen(){ return `<div class="stagger"><div class="eyebrow">Test 2 of 5 &middot; Visual reaction</div><h1>Catch it at its<br><span class="it">sharpest.</span></h1>
  <div class="lede" style="margin-top:6px">A ball pulses in and out of focus. Tap the instant it looks sharpest.</div>
  <div class="method"><span class="md"></span>Dynamic visual acuity</div>
  <div class="arena" id="rarena" onclick="reactTap()"><div class="net"></div><div class="gball" id="rball" style="filter:blur(4px)"></div><div class="tovl" id="rovl"></div></div>
  <div class="meta">Up to 3 tries &middot; we keep your best</div></div>`; }

/* golf: range the flag (stop the climbing marker level with the pin) */
function golfScreen(){ return `<div class="stagger"><div class="eyebrow">Test 2 of 5 &middot; Distance judgment</div><h1>Lock the <span class="it">distance.</span></h1>
  <div class="lede" style="margin-top:6px">A marker climbs toward the flag. Tap to stop it level with the pin.</div>
  <div class="method"><span class="md"></span>Dynamic visual acuity &middot; depth judgment</div>
  <div class="arena golf" id="grarena" onclick="grTap()"><div class="g-flag" id="grflag"><span class="g-line"></span><span class="g-pin">&#9971;</span></div><div class="g-marker" id="grmark"><span class="g-mlabel">carry</span></div><div class="g-yard" id="gryard">&mdash;</div><div class="tovl" id="rovl"></div></div>
  <div class="meta">Up to 3 tries &middot; we keep your best</div></div>`; }
const GR={best:0,attempts:0,live:false,raf:null,targetY:0,pad:30};
function grInit(){ GR.best=state.reaction||0; GR.attempts=0; GR.live=false;
  setOvl('rovl', introHtml('Range the flag','A marker climbs the fairway toward the pin. Tap to stop it dead level with the flag. The closer you lock the distance, the sharper your depth read.','grBegin')); }
function grBegin(){ countdown('rovl', grGo); }
function grGo(){ const mark=document.getElementById('grmark'), arena=document.getElementById('grarena'), flag=document.getElementById('grflag'); if(!mark||!arena)return;
  GR.live=true; hideOvl('rovl'); const H=arena.clientHeight, pad=GR.pad, range=H-pad*2;
  GR.targetY=pad+range*(0.16+Math.random()*0.62); if(flag) flag.style.top=GR.targetY+'px';
  const period=1500-Math.min(GR.attempts*180,420), t0=performance.now();
  const loop=(t)=>{ if(!GR.live)return; const ph=((t-t0)/period)%1, tri=ph<0.5?ph*2:2-ph*2; const y=pad+(1-tri)*range;
    mark.style.top=y+'px'; mark.dataset.y=y; const yd=document.getElementById('gryard'); if(yd) yd.textContent=Math.round(60+((H-pad-y)/range)*180)+' yds';
    GR.raf=requestAnimationFrame(loop); };
  GR.raf=requestAnimationFrame(loop); }
function grTap(){ if(!GR.live)return; GR.live=false; cancelAnimationFrame(GR.raf);
  const mark=document.getElementById('grmark'), arena=document.getElementById('grarena'); const y=parseFloat(mark.dataset.y||0), H=arena.clientHeight, pad=GR.pad, range=H-pad*2;
  const dist=Math.abs(y-GR.targetY)/range, sc=Math.max(42,Math.round(100-dist*125)); GR.best=Math.max(GR.best,sc); state.reaction=GR.best; GR.attempts++; animateChip();
  setOvl('rovl', resultHtml('Distance read',sc,GR.best,GR.attempts, dist<0.05?'Flagged it. Pure depth control.':(dist<0.15?'Close read, just off the pin.':'Misjudged the distance, and very trainable.'),'grBegin')); }

/* tennis / pickleball: read the serve (tap as the ball crosses the line) */
function serveScreen(){ return `<div class="stagger"><div class="eyebrow">Test 2 of 5 &middot; Serve tracking</div><h1>Pick it up <span class="it">clean.</span></h1>
  <div class="lede" style="margin-top:6px">A ball fires toward you. Tap the instant it crosses the line.</div>
  <div class="method"><span class="md"></span>Dynamic visual acuity &middot; reaction timing</div>
  <div class="arena serve" id="svarena" onclick="svTap()"><div class="sv-line"><span>STRIKE</span></div><div class="gball svball" id="svball"></div><div class="tovl" id="rovl"></div></div>
  <div class="meta">Up to 3 tries &middot; we keep your best</div></div>`; }
const SV={best:0,attempts:0,live:false,raf:null};
function svInit(){ SV.best=state.reaction||0; SV.attempts=0; SV.live=false;
  setOvl('rovl', introHtml('Read the serve','A ball fires from across the court. Tap the instant it crosses the strike line, the way you&rsquo;d pick up a fast serve. Catch it on the line and your read scores high.','svBegin')); }
function svBegin(){ countdown('rovl', svGo); }
function svGo(){ const ball=document.getElementById('svball'), arena=document.getElementById('svarena'); if(!ball||!arena)return;
  SV.live=true; hideOvl('rovl'); const H=arena.clientHeight, top=24, lineY=H-56; const dur=1400-Math.min(SV.attempts*220,560), t0=performance.now();
  const loop=(t)=>{ if(!SV.live)return; const p=(t-t0)/dur;
    if(p>=1.2){ SV.live=false; cancelAnimationFrame(SV.raf); SV.attempts++; const sc=44; SV.best=Math.max(SV.best,sc); state.reaction=SV.best; animateChip();
      setOvl('rovl', resultHtml('Serve read',sc,SV.best,SV.attempts,'It blew right past you. That lag is the fixable part.','svBegin')); return; }
    const y=top+p*(lineY-top), sz=18+Math.min(p,1)*30; ball.style.top=y+'px'; ball.style.width=sz+'px'; ball.style.height=sz+'px'; ball.dataset.p=p;
    SV.raf=requestAnimationFrame(loop); };
  SV.raf=requestAnimationFrame(loop); }
function svTap(){ if(!SV.live)return; SV.live=false; cancelAnimationFrame(SV.raf);
  const ball=document.getElementById('svball'); const p=parseFloat(ball.dataset.p||0); const d=Math.abs(1-p), sc=Math.max(42,Math.round(100-d*150));
  SV.best=Math.max(SV.best,sc); state.reaction=SV.best; SV.attempts++; animateChip();
  setOvl('rovl', resultHtml('Serve read',sc,SV.best,SV.attempts, d<0.05?'Dead on the line. Elite read.':(d<0.16?'Caught it, a touch early or late.':'Mistimed the read, and very trainable.'),'svBegin')); }

const RT={best:0,attempts:0,live:false,raf:null};
function reactInit(){ RT.best=state.reaction||0; RT.attempts=0; RT.live=false;
  setOvl('rovl', introHtml('Catch it at its sharpest','A ball will pulse in and out of focus. Tap the instant it looks sharpest, the way you&rsquo;d time a '+SP().verb+'.','reactBegin')); }
function reactBegin(){ countdown('rovl', reactGo); }
function reactGo(){ const ball=document.getElementById('rball'); if(!ball)return; RT.live=true; hideOvl('rovl'); ball.style.filter='blur(4px)'; const t0=performance.now();
  const loop=(t)=>{ if(!RT.live)return; const ph=((t-t0)/2300)%1; const sh=Math.abs(Math.sin(ph*Math.PI));
    ball.style.filter='blur('+((1-sh)*7).toFixed(2)+'px)'; ball.style.transform='scale('+(0.9+sh*0.16).toFixed(3)+')'; ball.dataset.s=sh.toFixed(3); RT.raf=requestAnimationFrame(loop); };
  RT.raf=requestAnimationFrame(loop); }
function reactTap(){ if(!RT.live)return; RT.live=false; cancelAnimationFrame(RT.raf); const ball=document.getElementById('rball'); const sh=parseFloat(ball.dataset.s||0);
  const sc=Math.round(58+sh*40); RT.best=Math.max(RT.best,sc); state.reaction=RT.best; RT.attempts++; ball.style.filter='blur(0)'; ball.style.transform='scale(1.08)'; animateChip();
  setOvl('rovl', resultHtml('On-court read',sc,RT.best,RT.attempts,sh>0.82?'Pro timing.':'A beat late, and fixable.','reactBegin')); }

/* T3 contrast fade (modal + 3 tries, slower) */
screens[8]=()=>`<div class="stagger"><div class="eyebrow">Test 3 of 5 &middot; Low-light vision</div><h1>Don&rsquo;t <span class="it">lose</span><br>sight.</h1>
  <div class="lede" style="margin-top:6px">A ball fades until it disappears. Tap the last instant you can still see it.</div>
  <div class="method"><span class="md"></span>Pelli-Robson contrast sensitivity</div>
  <div class="arena" id="farena" onclick="fadeTap()"><div class="net"></div><div class="gball" id="cball"></div><div class="tovl" id="fovl"></div></div>
  <div class="meta">Up to 3 tries &middot; we keep your best</div></div>`;
const FT={best:0,attempts:0,live:false,raf:null};
function fadeInit(){ FT.best=state.contrast||0; FT.attempts=0; FT.live=false;
  setOvl('fovl', introHtml('Don&rsquo;t lose the ball','The ball slowly fades to nothing. Tap the last instant you can still see it. The fainter you catch it, the sharper your low-light eyes.','fadeBegin')); }
function fadeBegin(){ countdown('fovl', fadeGo); }
function fadeGo(){ const ball=document.getElementById('cball'); if(!ball)return; FT.live=true; hideOvl('fovl'); ball.style.opacity='1'; const t0=performance.now();
  const loop=(t)=>{ if(!FT.live)return; const op=Math.max(0,1-(t-t0)/5200); ball.style.opacity=op.toFixed(3); ball.dataset.o=op.toFixed(3);
    if(op<=0.02){ FT.live=false; cancelAnimationFrame(FT.raf); const sc=60; FT.best=Math.max(FT.best,sc); state.contrast=FT.best; FT.attempts++; animateChip();
      setOvl('fovl', resultHtml('Contrast',sc,FT.best,FT.attempts,'It vanished. Low light is your gap.','fadeBegin')); return; }
    FT.raf=requestAnimationFrame(loop); };
  FT.raf=requestAnimationFrame(loop); }
function fadeTap(){ if(!FT.live)return; FT.live=false; cancelAnimationFrame(FT.raf); const ball=document.getElementById('cball'); const op=parseFloat(ball.dataset.o||1);
  const sc=Math.round(60+(1-op)*38); FT.best=Math.max(FT.best,sc); state.contrast=FT.best; FT.attempts++; ball.style.opacity='1'; animateChip();
  setOvl('fovl', resultHtml('Contrast',sc,FT.best,FT.attempts,op<0.25?'Sharp low-light read.':'Solid, room to gain.','fadeBegin')); }

/* overlay helpers */
function countdown(id,cb){ const o=document.getElementById(id); if(!o)return;
  const frame=(inner)=>`<div class="ovl-card"><div class="cd-l">Eyes up</div>${inner}</div>`;
  let n=3; o.style.display='grid'; o.innerHTML=frame('<div class="cd">'+n+'</div>');
  const tick=()=>{ n--;
    if(n>=1){ o.innerHTML=frame('<div class="cd">'+n+'</div>'); setTimeout(tick,620); }
    else { o.innerHTML=frame('<div class="cd go">Go</div>'); setTimeout(()=>{ hideOvl(id); cb&&cb(); },360); } };
  setTimeout(tick,620); }
function setOvl(id,html){ const o=document.getElementById(id); if(!o)return; o.innerHTML=html; o.style.display='grid'; }
function hideOvl(id){ const o=document.getElementById(id); if(o)o.style.display='none'; }
function introHtml(title,desc,fn){ return `<div class="ovl-card"><div class="ovl-t">${title}</div><p>${desc}</p><button class="btn" onclick="${fn}()">Begin <span class="arrow">&rarr;</span></button></div>`; }
function resultHtml(label,sc,best,attempts,note,fn){ const left=3-attempts; return `<div class="ovl-card"><div class="ovl-s">${best}</div><div class="ovl-l">${label} &middot; best of ${attempts}</div><p>${note}</p>${left>0?`<button class="btn ghost" style="margin-bottom:10px" onclick="${fn}()">Try again &middot; ${left} left</button>`:''}<button class="btn" onclick="next()">Continue <span class="arrow">&rarr;</span></button></div>`; }

/* T4 near (tap) */
screens[9]=()=>{ const NEAR=nearRows();
  return `<div class="stagger"><div class="eyebrow">Test 4 of 5 &middot; Up-close vision</div><h1>The fine print<br><span class="it">test.</span></h1>
  <div class="lede" style="margin-top:6px">Hold the phone at a comfortable reading distance. Tap the smallest line you can read clearly without readers.</div>
  <div class="method"><span class="md"></span>Near point of accommodation &middot; presbyopia</div>
  <div class="surface">${NEAR.map((r,i)=>`<div class="near-row ${state.near===i?'sel':''}" style="font-size:${r[2]}px" onclick="setNear(${i})">${r[1]}<div class="rowtag" style="letter-spacing:.1em">${r[0]}</div></div>`).join('')}</div>
  <div class="meta">Reveals presbyopia, the reading change after 45</div></div>`; };
function setNear(i){ state.near=i; animateChip(); flash('Near: '+nearRows()[i][0], i>=3?'Excellent up-close vision.':'A common reading change, very fixable.', next); }

/* T5 precision: find the break (hyperacuity / vernier) */
screens[10]=()=>`<div class="stagger"><div class="eyebrow">Test 5 of 5 &middot; Precision test</div><h1>Find the<br><span class="it">offset.</span></h1>
  <div class="lede" style="margin-top:6px">One of these lines has a small offset at the midpoint. Tap the one that looks misaligned.</div>
  <div class="method"><span class="md"></span>Vernier hyperacuity</div>
  <div class="arena fence" id="hyarena"><div class="fence-rows" id="hyrows"></div><div class="hy-lvl" id="hylvl"></div><div class="tovl" id="hyovl"></div></div>
  <button class="btn ghost" id="hygiveup" style="margin-top:11px" onclick="hyPass()">They look identical to me</button>
  <div class="meta">The gap gets finer each round &middot; we keep your best</div></div>`;
const HY={best:0,level:0,live:false,idx:0,dir:1,offsets:[11,6.5,4,2.4,1.4]};
function hyperInit(){ HY.best=state.hyper||0; HY.level=0; HY.live=false;
  setOvl('hyovl', introHtml('Find the break','Lines stand in a row. One is split, its top half nudged off from its bottom. Tap the one that isn&rsquo;t true. Each round the gap shrinks. See how fine your eyes can resolve.','hyBegin')); }
function hyBegin(){ HY.level=0; countdown('hyovl', hyRound); }
function hyRound(){ hideOvl('hyovl'); renderLines(); }
function renderLines(){ const rows=document.getElementById('hyrows'); if(!rows)return; const N=6;
  HY.idx=Math.floor(Math.random()*N); HY.dir=Math.random()<0.5?-1:1; const off=(HY.offsets[HY.level]||1)*HY.dir;
  let html=''; for(let i=0;i<N;i++){ const o=(i===HY.idx)?off:0;
    html+=`<div class="fline" onclick="hyTap(${i})"><span class="seg top" style="transform:translateX(${o}px)"></span><span class="seg bot"></span></div>`; }
  rows.innerHTML=html; const lv=document.getElementById('hylvl'); if(lv) lv.textContent='Round '+(HY.level+1)+' of '+HY.offsets.length;
  HY.live=true; }
function hyScore(){ return Math.min(100,50+HY.level*10); }
function hyResult(note){ return `<div class="ovl-card"><div class="ovl-s">${HY.best}</div><div class="ovl-l">Precision &middot; finest gap</div><p>${note}</p><button class="btn ghost" style="margin-bottom:10px" onclick="hyBegin()">Try again <span class="arrow">&rarr;</span></button><button class="btn" onclick="next()">Continue <span class="arrow">&rarr;</span></button></div>`; }
function hyTap(i){ if(!HY.live)return;
  if(i===HY.idx){ HY.live=false; HY.level++; HY.best=Math.max(HY.best,hyScore()); state.hyper=HY.best; animateChip();
    if(HY.level>=HY.offsets.length){ setOvl('hyovl', hyResult('Surgeon-grade. You resolve down to a hair, the top few percent of any age.')); }
    else { flash('Sharp.','Finer now.', renderLines); } }
  else { HY.live=false; HY.best=Math.max(HY.best,Math.max(50,40+HY.level*10)); state.hyper=HY.best; animateChip();
    setOvl('hyovl', hyResult(HY.level>=3?'Strong eyes. That is a genuinely fine catch.':'The fine line slipped past, and that edge is trainable.')); } }
function hyPass(){ if(!HY.live)return; HY.live=false; HY.best=Math.max(HY.best,Math.max(50,40+HY.level*10)); state.hyper=HY.best; animateChip();
  setOvl('hyovl', hyResult(HY.level>=3?'Honest call, and a sharp one. You held to a fine gap.':'No shame, that gap is genuinely tiny.')); }

screens[11]=()=>`<div class="stagger"><div class="eyebrow">Your eye history</div><h1>Anything we<br>should <span class="it">know?</span></h1>
  <div class="lede" style="margin-top:6px">Helps your doctor prepare if you come in for a full exam.</div>
  <div class="hint-pill">&#9745; Select all that apply</div>
  <div class="opts">${CONTEXT.map((c,i)=>`<div class="opt ${state.context.includes(i)?'sel':''}" onclick="toggleCtx(${i})"><span class="cbx">${state.context.includes(i)?'&#10003;':''}</span>${c}</div>`).join('')}</div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.context.length?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;

screens[12]=()=>`<div class="stagger"><div class="eyebrow">Your location</div><h1>Where do you<br>most often <span class="it">play?</span></h1>
  <div class="lede" style="margin-top:6px">So we can find the closest office to you.</div>
  <div class="field"><label>Home club, zip code, or side of town</label>
    <input list="clubs" id="club" placeholder="e.g. Crooked Stick, 46033, or North Side" value="${state.club}" oninput="state.club=this.value;tog('c10',this.value.length>1)"/>
    <datalist id="clubs"><option>Crooked Stick Golf Club</option><option>Conway Farms Golf Club</option><option>Butler National</option><option>Life Time North Shore</option><option>The Picklr</option><option>A.C. Nielsen Tennis Center</option><option>Carmel Racquet Club</option><option>Midtown Athletic Club</option><option>Cherry Creek Golf Club</option></datalist></div>
  <div class="reassure">&#128274;&nbsp;<div><b>Private.</b> Used only to find the office nearest you. Never shared, never spam.</div></div>
  <div class="spacer"></div><button class="btn" id="c10" onclick="next()" ${state.club.length>1?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;

screens[13]=()=>`<div class="stagger"><div class="eyebrow">Last step</div><h1>Send me my<br><span class="it">scouting report.</span></h1>
  <div class="lede" style="margin-top:6px">Your results are ready. Tell us where to deliver them.</div>
  <div class="field"><label>First name</label><input id="nm" placeholder="Jordan" value="${state.name}" oninput="state.name=this.value;chkContact()"/></div>
  <div class="field"><label>Email</label><input id="em" type="email" inputmode="email" placeholder="you@email.com" value="${state.email}" oninput="state.email=this.value;chkContact()"/></div>
  <div class="reassure">&#9201;&nbsp;<div>Instant results, plus an invite to a <b>complimentary full Athlete&rsquo;s Eye Test</b> near you, if your scores call for it.</div></div>
  <div class="spacer"></div><button class="btn" id="c11" onclick="next()" disabled>See where my game stands <span class="arrow">&rarr;</span></button></div>`;
function chkContact(){ tog('c11', state.name.length>1 && /.+@.+\..+/.test(state.email)); }
function tog(id,ok){ const b=document.getElementById(id); if(b){b.disabled=!ok;} }

screens[14]=()=>{ const s=totalScore(), avg=ageAvg(), gap=Math.max(0,95-s), mins=8+Math.floor((state.club.length*7)%14);
  const cand=isCandidate(), F=FOCUS[focusKind()];
  const office=state.club?('the office ~'+mins+' min from '+state.club):('your nearest office, ~'+mins+' min away');
  const metrics=[['Distance acuity',acuityScore(),'Your read on a long, fast ball.'],[SP().readMetric,state.reaction,SP().readNote],['Contrast',state.contrast,'Finding the ball in glare and dusk.'],['Near vision',nearScore(),'The card, the menu, the rangefinder.'],['Precision',state.hyper,'The finest misalignment your eyes catch.']];
  const pathCard = cand
    ? `<div class="path" style="background:linear-gradient(150deg,var(--gold-soft),#fdf9f1);border:1px solid #e7d6b4;opacity:0;animation:rise .5s .55s forwards"><div class="tag" style="background:var(--gold);color:#3a2c12">&#9670; Room to improve: ${gap} points below your peak</div><div class="t">Most of that gap is correctable with the right evaluation.</div><p>Your screens show room for improvement on ${F.line}. A full in-office Athlete&rsquo;s Eye Test with a specialist who works with active adults can pinpoint exactly what&rsquo;s changed and what can be corrected. No pressure, just a clear picture.</p></div>`
    : `<div class="path" style="background:linear-gradient(150deg,var(--green-soft),#fbf9f2);border:1px solid var(--green-tint);opacity:0;animation:rise .5s .55s forwards"><div class="tag" style="background:var(--green);color:#f3efe4">&#9733; Above your age group average</div><div class="t">Your eyes are performing well.</div><p>You scored above the typical ${state.age||'player'} on these screens. A full workup isn&rsquo;t urgent, and that is the honest answer most tools never give you. Here is what is worth your time.</p></div>`;
  const docFocus = cand ? F.clinical : 'Routine / wellness visit';
  const actions = cand
    ? `<button class="btn" onclick="alert('Demo: books the complimentary full Athlete Eye Test and routes this income-qualified, candidacy-screened, proximity-matched lead with the full pre-screen. Doctor focus: ${F.clinical}. No procedure is promised, the doctor decides in clinic.')">Claim my complimentary Athlete&rsquo;s Eye Test <span class="arrow">&rarr;</span></button>
  <div class="cta-prac">with a doctor who works with active adults &middot; ${office}</div>`
    : `<button class="btn" onclick="alert('Meet the practice: comprehensive eye care, dry-eye treatment, sports-vision training, premium eyewear, and a relationship for whenever your eyes do need more.')">Meet the practice &amp; services <span class="arrow">&rarr;</span></button>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
    <button class="btn ghost" onclick="alert('Opens turn-by-turn directions to the nearest office.')">&#128205; Directions</button>
    <button class="btn ghost" onclick="alert('Shares the test so your partner can match up against your score. A built-in referral loop.')">&#129309; Challenge a partner</button></div>
  <button class="btn ghost" style="margin-top:10px" onclick="alert('Schedules a routine exam or connects you to the office for basic vision needs.')">Book a routine exam or contact the office</button>
  <div class="cta-prac">${office}</div>`;
  return `<div>
  <div class="hero report" style="opacity:0;animation:rise .55s forwards"><img src="${img(SP().hero,820,62)}" alt="" onload="this.classList.add('on')"/><div class="scrim"></div>
    <div class="cap"><div class="eye">${state.name||'Athlete'}&rsquo;s Vision Scouting Report</div><div class="ln">${SP().heroLine}</div></div></div>
  <div class="ring-wrap" style="opacity:0;animation:rise .6s .1s forwards"><div class="ring">
    <svg width="170" height="170"><circle cx="85" cy="85" r="73" fill="none" stroke="#e7e1d4" stroke-width="11"/>
    <circle id="prog" cx="85" cy="85" r="73" fill="none" stroke="url(#g)" stroke-width="11" stroke-linecap="round" stroke-dasharray="459" stroke-dashoffset="459"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1E4636"/><stop offset="1" stop-color="#B0894B"/></linearGradient></defs></svg>
    <div class="num"><b id="bignum">0</b><span>Vision Score</span></div></div></div>
  <div class="acu-est" style="opacity:0;animation:rise .5s .28s forwards">${SP().pro} reads at <b>95</b> &middot; your-age average is <b>${avg}</b> &middot; you scored <b>${s}</b></div>
  <div class="bars" style="opacity:0;animation:rise .5s .4s forwards">
    ${metrics.map(m=>`<div class="bar"><div class="bl"><span style="color:var(--ink)">${m[0]}</span><span>${m[1]} / 100</span></div>
      <div class="track"><i data-w="${m[1]}"></i><div class="pk" style="left:${avg}%"></div></div><div class="barnote">${m[2]}</div></div>`).join('')}</div>
  ${pathCard}
  <div class="docbox" style="opacity:0;animation:rise .5s .65s forwards"><div class="h">&#128203; Chair-ready pre-screen your doctor receives</div>
    <ul>
      <li>Sport &amp; level <b>${sportName()} &middot; ${state.skill||'&mdash;'}</b></li>
      <li>Plays at <b>${state.club||'&mdash;'}</b></li>
      <li>Age band <b>${state.age||'&mdash;'}</b></li>
      <li>Estimated acuity <b>${state.acuity!=null?ACUITY[state.acuity][0]:'&mdash;'}</b></li>
      <li>Near / contrast <b>${nearScore()} / ${state.contrast}</b></li>
      <li>Spatial precision <b>${state.hyper||'&mdash;'}</b></li>
      <li>Current correction <b>${correction()}</b></li>
      <li>Flags <b>${ctxFlags()}</b></li>
      <li>Nearest office <b>~${mins} min</b></li>
      <li>Focus for the visit <b>${docFocus}</b></li>
    </ul></div>
  <div class="spacer" style="min-height:18px"></div>
  ${actions}
  <div class="discbox"><b>This is a vision screening, not a medical diagnosis.</b> It uses methods modeled on clinical standards but cannot replace a comprehensive eye exam by a licensed professional. Results are estimates based on an uncalibrated personal device.</div>
  <div class="disc">UX model &middot; concept by ajile Media for Dancecard</div></div>`; };

let rendering=false;
function render(){
  setBar(); animateChip();
  back.classList.toggle('show', step>0 && step<14);
  screenEl.classList.add('out');
  setTimeout(()=>{
    screenEl.innerHTML = screens[step]();
    screenEl.scrollTop = 0;
    screenEl.classList.remove('out');
    if(step===7) setTimeout(readInit,320);
    if(step===8) setTimeout(fadeInit,320);
    if(step===10) setTimeout(hyperInit,320);
    if(step===14) setTimeout(animateReport,80);
  }, rendering?170:0);
  rendering=true;
}
function animateReport(){
  const s=totalScore(), num=document.getElementById('bignum'); if(!num)return; let c=0;
  const t=setInterval(()=>{c+=Math.max(1,Math.round((s-c)/8));if(c>=s){c=s;clearInterval(t);}num.textContent=c;},30);
  const prog=document.getElementById('prog'), off=459-(459*(s/100));
  setTimeout(()=>prog.style.transition='stroke-dashoffset 1.3s cubic-bezier(.2,.8,.2,1)',20);
  setTimeout(()=>prog.style.strokeDashoffset=off,120);
  setTimeout(()=>document.querySelectorAll('.track>i').forEach(i=>i.style.width=i.dataset.w+'%'),520);
}
render();
</script>
