<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Athlete's Eye Test — Vision Workup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#F6F2E9; --cream2:#FBF8F1; --card:#FFFFFF;
    --ink:#1B2B23; --muted:#6C7A70; --line:#E6E0D3;
    --green:#1E4636; --green2:#163A2C; --green-soft:#EAF0E9; --green-tint:#DCE7DD;
    --gold:#B0894B; --gold-soft:#F2E8D4; --bad:#B5552F;
    --sans:'Mulish',-apple-system,system-ui,sans-serif;
    --disp:'Lora',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink);background:#e9e3d6;display:grid;place-items:center;min-height:100dvh}
  .app{position:relative;width:100%;max-width:440px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;
    background:radial-gradient(120% 50% at 50% -5%,#fbf8f1,transparent 60%),var(--cream);overflow:hidden}
  @media (min-width:780px){
    body{padding:22px}
    .app{height:min(900px,94dvh);border-radius:34px;box-shadow:0 50px 100px -34px rgba(20,40,30,.45);border:1px solid #e7e1d4}
  }
  /* top */
  .top{position:relative;z-index:4;display:flex;align-items:center;gap:10px;
    padding:calc(16px + env(safe-area-inset-top)) 22px 8px}
  .brand{font-weight:800;letter-spacing:.12em;font-size:10.5px;text-transform:uppercase;color:var(--muted)}
  .brand b{color:var(--green)}
  .scorechip{margin-left:auto;display:flex;align-items:center;gap:6px;font-weight:800;font-size:12px;color:var(--green);
    background:var(--green-soft);border:1px solid var(--green-tint);padding:5px 11px;border-radius:999px;transition:opacity .3s}
  .scorechip .dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
  .progress{position:relative;z-index:4;height:4px;margin:8px 22px 0;background:#e7e1d4;border-radius:9px;overflow:hidden}
  .progress>i{display:block;height:100%;width:5%;border-radius:9px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .55s cubic-bezier(.2,.8,.2,1)}
  .back{position:absolute;top:calc(13px + env(safe-area-inset-top));left:14px;z-index:6;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;padding:6px 10px;border-radius:10px;opacity:0;transition:.2s}
  .back.show{opacity:1}.back:active{background:rgba(0,0,0,.04)}
  /* single scrolling screen */
  .stage{position:relative;z-index:3;flex:1;min-height:0;display:flex}
  .screen{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;
    padding:18px 22px calc(24px + env(safe-area-inset-bottom));opacity:1;transition:opacity .26s ease}
  .screen.out{opacity:0}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:13px;flex:0 0 auto}
  h1{font-family:var(--disp);font-weight:600;font-size:clamp(27px,7.8vw,33px);line-height:1.12;color:var(--green2);flex:0 0 auto}
  h1 .it{font-style:italic;color:var(--gold)}
  .lede{color:#4d5b52;font-size:16px;line-height:1.55;margin-top:12px;flex:0 0 auto}
  .spacer{flex:1 1 auto;min-height:16px}
  /* buttons */
  .btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);font-weight:700;font-size:16.5px;padding:17px 20px;border-radius:14px;width:100%;
    display:flex;align-items:center;justify-content:center;gap:10px;background:var(--green);color:#f3efe4;transition:transform .12s,filter .2s;flex:0 0 auto;box-shadow:0 10px 22px -12px rgba(30,70,54,.6)}
  .btn:active{transform:scale(.985)}.btn:hover{filter:brightness(1.06)}
  .btn[disabled]{opacity:.42;box-shadow:none}
  .btn.ghost{background:transparent;color:var(--green);border:1.5px solid var(--green-tint);box-shadow:none}
  .btn .arrow{font-size:19px}
  .meta{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;margin-top:12px;flex:0 0 auto}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:p 1.9s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(176,137,75,.45)}70%{box-shadow:0 0 0 9px rgba(176,137,75,0)}100%{box-shadow:0 0 0 0 rgba(176,137,75,0)}}
  /* cards */
  .cards{display:flex;flex-direction:column;gap:11px;margin-top:18px;flex:0 0 auto}
  .card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:15px;cursor:pointer;background:var(--card);border:1.5px solid var(--line);transition:.15s}
  .card:active{transform:scale(.99)}.card.sel{border-color:var(--green);background:var(--green-soft)}
  .card .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;background:var(--cream);border:1px solid var(--line)}
  .card .tt{font-weight:700;font-size:16.5px;color:var(--ink)}.card .ss{color:var(--muted);font-size:12.5px;margin-top:2px}
  .card .chk{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;flex:0 0 auto;color:#fff}
  .card.sel .chk{border-color:var(--green);background:var(--green);font-weight:900;font-size:13px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:18px;flex:0 0 auto}
  .tile{padding:17px 16px;border-radius:15px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;transition:.15s;text-align:left}
  .tile:active{transform:scale(.99)}.tile.sel{border-color:var(--green);background:var(--green-soft)}
  .tile b{font-family:var(--disp);font-size:23px;font-weight:600;display:block;color:var(--green2)}
  .tile span{color:var(--muted);font-size:12px}
  .chips{display:flex;flex-direction:column;gap:9px;margin-top:18px;flex:0 0 auto}
  .chip{padding:14px 16px;border-radius:13px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;font-weight:600;font-size:14.5px;transition:.15s;display:flex;align-items:center;gap:11px;color:var(--ink)}
  .chip:active{transform:scale(.99)}.chip.sel{background:var(--green-soft);border-color:var(--green)}
  .chip .e{font-size:18px;flex:0 0 auto}
  .chip .tick{margin-left:auto;color:var(--green);font-weight:900;opacity:0}.chip.sel .tick{opacity:1}
  /* test surfaces — light, low glare */
  .surface{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-top:16px;padding:22px 18px;flex:0 0 auto}
  .acuity-row,.near-row{display:block;width:100%;text-align:center;color:#13211a;cursor:pointer;padding:9px 4px;border-radius:10px;transition:.12s;font-weight:700;letter-spacing:.18em}
  .acuity-row:active,.near-row:active{background:var(--green-soft)}
  .acuity-row.sel,.near-row.sel{background:var(--green-soft);outline:1.5px solid var(--green)}
  .near-row{font-family:var(--disp);font-weight:500;letter-spacing:normal;line-height:1.25}
  .rowtag{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.1em}
  .dotrow{display:flex;align-items:center;justify-content:space-between;gap:7px;padding:8px 2px;flex:0 0 auto}
  .vdot{flex:1;aspect-ratio:1;border-radius:50%;background:#33453b;cursor:pointer;transition:transform .15s;max-width:42px}
  .vdot:active{transform:scale(1.15)}
  .scale{display:flex;justify-content:space-between;color:var(--muted);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;margin-top:8px;flex:0 0 auto}
  .burst{display:grid;place-items:center;padding:6px 0;flex:0 0 auto}
  .spokebtns{display:flex;gap:10px;margin-top:14px;flex:0 0 auto}.spokebtns .btn{font-size:14.5px;padding:14px}
  /* inputs */
  .field{margin-top:14px;flex:0 0 auto}
  .field label{display:block;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:7px}
  .field input{width:100%;padding:15px;border-radius:13px;background:var(--card);border:1.5px solid var(--line);color:var(--ink);font-family:var(--sans);font-size:16px;font-weight:600}
  .field input:focus{outline:none;border-color:var(--green)}
  .reassure{display:flex;gap:9px;align-items:flex-start;color:var(--muted);font-size:12.5px;margin-top:13px;line-height:1.45;flex:0 0 auto}
  .reassure b{color:#3a4842}
  /* report */
  .ring-wrap{display:grid;place-items:center;margin:4px 0 2px;flex:0 0 auto}
  .ring{position:relative;width:170px;height:170px}.ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .ring .num b{font-family:var(--disp);font-size:52px;font-weight:600;line-height:1;color:var(--green2)}
  .ring .num span{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-top:5px;font-weight:800}
  .acu-est{text-align:center;margin-top:4px;flex:0 0 auto;font-size:13px;color:var(--muted)}.acu-est b{color:var(--green2);font-family:var(--disp)}
  .bars{margin-top:16px;display:flex;flex-direction:column;gap:13px;flex:0 0 auto}
  .bar .bl{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:6px}.bar .bl span{color:var(--muted);font-weight:600}
  .track{position:relative;height:9px;border-radius:6px;background:#e7e1d4;overflow:visible}
  .track>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--green),var(--gold));width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .track .pk{position:absolute;top:-3px;width:2px;height:15px;background:var(--green2);border-radius:2px;opacity:.55}
  .barnote{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.4}
  .path{margin-top:18px;padding:18px;border-radius:18px;background:linear-gradient(150deg,var(--gold-soft),#fdf9f1);border:1px solid #e7d6b4;flex:0 0 auto}
  .path .tag{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:#3a2c12;background:var(--gold);padding:5px 11px;border-radius:999px;margin-bottom:11px}
  .path .t{font-family:var(--disp);font-style:italic;font-size:20px;color:var(--green2);line-height:1.18;margin-bottom:7px}
  .path p{font-size:14px;color:#3a4842;line-height:1.52}
  .docbox{margin-top:16px;border:1px dashed var(--green-tint);border-radius:16px;background:var(--green-soft);padding:16px;flex:0 0 auto}
  .docbox .h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
  .docbox ul{list-style:none;display:grid;gap:7px}
  .docbox li{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:#33433b}
  .docbox li b{color:var(--green2);font-weight:700;text-align:right}
  .cta-prac{text-align:center;color:var(--muted);font-size:12.5px;margin-top:11px;flex:0 0 auto}.cta-prac b{color:var(--ink)}
  .disc{text-align:center;color:#9a937f;font-size:10.5px;margin-top:16px;flex:0 0 auto}
  /* feedback */
  .feedback{position:absolute;inset:0;display:grid;place-items:center;z-index:7;opacity:0;pointer-events:none;transition:opacity .3s}
  .feedback.on{opacity:1}
  .feedback .fb{background:rgba(27,43,35,.93);color:#f2efe5;border-radius:18px;padding:22px 28px;text-align:center;max-width:80%;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
  .feedback .fb .big{font-family:var(--disp);font-size:26px;color:#fff;font-weight:600}
  .feedback .fb .sm{color:#cdd6cd;font-size:13.5px;margin-top:5px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .stagger>*{opacity:0;animation:rise .5s forwards}
  .stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.1s}.stagger>*:nth-child(3){animation-delay:.17s}
  .stagger>*:nth-child(4){animation-delay:.24s}.stagger>*:nth-child(5){animation-delay:.31s}.stagger>*:nth-child(6){animation-delay:.38s}
</style>
</head>
<body>
<div class="app">
  <div class="back" id="back">&larr; Back</div>
  <div class="top">
    <div class="brand">Athlete&rsquo;s Eye Test <b>&middot;</b> Powered by Dancecard</div>
    <div class="scorechip" id="chip" style="opacity:0"><span class="dot"></span><span id="chipval">0</span> pts</div>
  </div>
  <div class="progress"><i id="bar"></i></div>
  <div class="stage"><div class="screen" id="screen"></div></div>
  <div class="feedback" id="feedback"><div class="fb"><div class="big" id="fbbig"></div><div class="sm" id="fbsm"></div></div></div>
</div>

<script>
const state={ sport:null, age:null, pain:null, acuity:null, contrast:0, clarity:0, near:null, context:[], club:'', name:'', email:'' };
let step=0; const TOTAL=12;
const screenEl=document.getElementById('screen'), bar=document.getElementById('bar'),
      chip=document.getElementById('chip'), chipval=document.getElementById('chipval'), back=document.getElementById('back');

const ACUITY=[['20/80','E F P',46],['20/60','T O Z',36],['20/40','L P E D',28],['20/30','P E C F D',22],['20/25','E D F C Z P',17],['20/20','F E L O P Z D',13]];
const NEAR=[['Easy','Reading the leaderboard',26],['Comfortable','A note from the pro shop',20],['Average','The fine print on a scorecard',15],['Sharp','Settings on your rangefinder',12],['Excellent','The disclaimer on a pill bottle',10]];

function acuityScore(){ return state.acuity==null?0:[55,63,72,81,90,97][state.acuity]; }
function nearScore(){ return state.near==null?0:[58,68,78,88,96][state.near]; }
function totalScore(){ const v=[acuityScore(),state.contrast,state.clarity,nearScore()].filter(x=>x>0); return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0; }
function ageAvg(){ return {'40s':88,'50s':82,'60s':74,'70+':66}[state.age]||78; }

function animateChip(){ chip.style.opacity=step>=4?'1':'0'; const t=totalScore(); let c=parseInt(chipval.textContent)||0;
  const iv=setInterval(()=>{c+=Math.max(1,Math.round((t-c)/6));if(c>=t){c=t;clearInterval(iv);}chipval.textContent=c;},28); }
function setBar(){ bar.style.width=Math.max(5,(step/(TOTAL-1))*100)+'%'; }
function flash(big,sm,cb){ const f=document.getElementById('feedback');document.getElementById('fbbig').textContent=big;document.getElementById('fbsm').textContent=sm;
  f.classList.add('on');setTimeout(()=>{f.classList.remove('on');cb&&cb();},1150); }
function next(){ if(step<TOTAL-1){step++;render();} }
back.onclick=()=>{ if(step>0){step--;render();} };

/* ---- clinical bridge ---- */
const AGE=[['40s','Refractive prime'],['50s','Reading creeps in'],['60s','Lens changes begin'],['70+','Cataract years']];
const SYMPTOMS=[
  ['&#128083;','Glasses fog or slip mid-point','refractive'],
  ['&#128167;','Contacts dry out outdoors','refractive'],
  ['&#127934;','I can&rsquo;t track the ball like I used to','dynamic'],
  ['&#128214;','Reading the scorecard up close','near'],
  ['&#127769;','Glare or halos driving at night','glare'],
  ['&#128161;','Low light kills my read','glare']
];
const CONTEXT=[
  ['&#128083;','I wear glasses, contacts, or readers'],
  ['&#129526;','I&rsquo;ve had eye surgery before'],
  ['&#129656;','Diabetes or glaucoma in my history'],
  ['&#128167;','Dry or irritated eyes'],
  ['&#10003;','None of these']
];
function symKind(){ return (SYMPTOMS.find(x=>x[1]===state.pain)||[])[2]; }
function procedurePath(){
  const a=state.age, k=symKind(), older=(a==='60s'||a==='70+'), mid=(a==='50s');
  const nearWeak=(state.near!=null && state.near<=1), contrastWeak=(state.contrast>0 && state.contrast<74);
  if(older && (k==='glare'||contrastWeak||k==='dynamic')) return 'CATARACT';
  if(older) return 'LAL';
  if((mid||a==='60s') && (k==='near'||nearWeak)) return 'LAL';
  return 'LASIK';
}
const PATHS={
  LASIK:{tag:'LASIK consult',t:'You may be done with glasses for good.',
    body:'Your distance and astigmatism reads point to correctable refractive error. Plenty of players your age get off glasses and contacts permanently with a brief laser procedure. Your in-clinic test confirms candidacy.',
    cta:'Reserve my complimentary LASIK assessment'},
  LAL:{tag:'Premium lens (LAL) consult',t:'Your near vision is fixable, and adjustable.',
    body:'After the mid-40s the lens stiffens, that&rsquo;s the reading and low-light change you&rsquo;re feeling. Today&rsquo;s Light Adjustable Lens restores both and is fine-tuned to your eyes after the fact. Your in-clinic test maps your custom prescription.',
    cta:'Reserve my complimentary lens-vision assessment'},
  CATARACT:{tag:'Cataract + premium lens eval',t:'Sharper than you&rsquo;ve seen in years.',
    body:'Your contrast and glare patterns are classic early lens changes. The upside: a lens-based fix can deliver crisper vision than you&rsquo;ve had in a decade, often with a premium lens dialed in afterward. Your in-clinic test checks candidacy.',
    cta:'Reserve my complimentary vision evaluation'}
};

const screens=[];

screens[0]=()=>`<div class="stagger">
  <div class="eyebrow">Complimentary &middot; about 2 minutes</div>
  <h1>Your personal<br><span class="it">vision workup.</span></h1>
  <div class="lede">A guided eye performance check, the same lens the pros use to read the ball, with a Scouting Report and a complimentary in-clinic assessment near your club.</div>
  <div class="spacer"></div>
  <button class="btn" onclick="next()">Begin my workup <span class="arrow">&rarr;</span></button>
  <div class="meta"><span class="pulse"></span> Four quick vision tests &middot; no glasses required</div></div>`;

screens[1]=()=>{ const o=[['Pickleball','&#127952;','Fastest game on the court'],['Golf','&#9971;','Tracking the line and the lie'],['Tennis','&#127934;','Reading pace and spin']];
  return `<div class="stagger"><div class="eyebrow">Your game</div><h1>Which is <span class="it">your</span> game?</h1>
  <div class="lede" style="margin-top:8px">We tune the workup to how you actually play.</div>
  <div class="cards">${o.map(x=>`<div class="card ${state.sport===x[0]?'sel':''}" onclick="state.sport='${x[0]}';render()"><div class="ic">${x[1]}</div><div><div class="tt">${x[0]}</div><div class="ss">${x[2]}</div></div><div class="chk">${state.sport===x[0]?'&#10003;':''}</div></div>`).join('')}</div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.sport?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`; };

screens[2]=()=>`<div class="stagger"><div class="eyebrow">Your prime</div><h1>Which decade<br>are you <span class="it">playing</span> in?</h1>
  <div class="lede" style="margin-top:8px">Vision shifts with the years. This tunes your read.</div>
  <div class="grid2">${AGE.map(a=>`<div class="tile ${state.age===a[0]?'sel':''}" onclick="state.age='${a[0]}';render()"><b>${a[0]}</b><span>${a[1]}</span></div>`).join('')}</div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.age?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;

screens[3]=()=>`<div class="stagger"><div class="eyebrow">On the court</div><h1>What costs you<br>the <span class="it">most</span>?</h1>
  <div class="lede" style="margin-top:8px">Pick the one that stings. We&rsquo;ll measure it.</div>
  <div class="chips">${SYMPTOMS.map((p,i)=>`<div class="chip ${state.pain===p[1]?'sel':''}" onclick="state.pain=SYMPTOMS[${i}][1];render()"><span class="e">${p[0]}</span>${p[1]}<span class="tick">&#10003;</span></div>`).join('')}</div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.pain?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;

/* TEST 1 — distance acuity */
screens[4]=()=>`<div class="stagger"><div class="eyebrow">Vision Test 1 of 4 &middot; Distance</div><h1>Smallest line<br>you can <span class="it">read</span>?</h1>
  <div class="lede" style="margin-top:6px">Arm&rsquo;s length, one eye at a time if you like. Tap the smallest row you can read clearly.</div>
  <div class="surface">${ACUITY.map((r,i)=>`<div class="acuity-row ${state.acuity===i?'sel':''}" style="font-size:${r[2]}px" onclick="setAcuity(${i})">${r[1]}<div class="rowtag">${r[0]}</div></div>`).join('')}</div>
  <div class="meta">Estimates your distance acuity &middot; tap your line</div></div>`;
function setAcuity(i){ state.acuity=i; animateChip(); flash('Distance: '+ACUITY[i][0], i>=4?'Crisp eyes.':'Good read, we can sharpen it.', next); }

/* TEST 2 — contrast */
screens[5]=()=>{ const op=[1,.6,.4,.26,.16,.09];
  return `<div class="stagger"><div class="eyebrow">Vision Test 2 of 4 &middot; Contrast</div><h1>Tap the <span class="it">faintest</span><br>dot you can see.</h1>
  <div class="lede" style="margin-top:6px">Contrast sensitivity is how you find the ball in glare and shadow, the first thing a clouding lens steals.</div>
  <div class="surface"><div class="dotrow">${op.map((o,i)=>`<div class="vdot" style="opacity:${o}" onclick="contrast(${i})"></div>`).join('')}</div>
  <div class="scale"><span>Obvious</span><span>Barely there</span></div></div>
  <div class="meta">Trust your eyes &middot; tap the last one you can make out</div></div>`; };
function contrast(i){ state.contrast=[58,66,74,83,91,97][i]; animateChip(); flash('Contrast: '+state.contrast,'That is your low-light edge.',next); }

/* TEST 3 — astigmatism */
screens[6]=()=>{ let l=''; for(let a=0;a<24;a++){const d=a*15;l+=`<line x1="100" y1="100" x2="100" y2="10" stroke="#23332a" stroke-width="${a%6===0?3:1.4}" transform="rotate(${d} 100 100)"/>`;}
  return `<div class="stagger"><div class="eyebrow">Vision Test 3 of 4 &middot; Optical quality</div><h1>Do the lines<br>look <span class="it">even</span>?</h1>
  <div class="lede" style="margin-top:6px">Cover one eye. If some spokes look bolder or blurrier, that&rsquo;s astigmatism pulling at your sharpness.</div>
  <div class="surface"><div class="burst"><svg width="186" height="186" viewBox="0 0 200 200">${l}<circle cx="100" cy="100" r="6" fill="#fff" stroke="var(--green)" stroke-width="2"/></svg></div></div>
  <div class="spokebtns"><button class="btn ghost" onclick="clarity(72)">A few stand out</button><button class="btn" onclick="clarity(94)">All sharp &amp; even</button></div></div>`; };
function clarity(v){ state.clarity=v; animateChip(); flash('Optical quality: '+v, v>85?'Clean optics.':'A correctable astigmatism signal.', next); }

/* TEST 4 — near vision */
screens[7]=()=>`<div class="stagger"><div class="eyebrow">Vision Test 4 of 4 &middot; Near</div><h1>How close can<br>you <span class="it">read</span>?</h1>
  <div class="lede" style="margin-top:6px">Hold the phone where you&rsquo;d read a menu. Tap the smallest line you can read without reaching for readers.</div>
  <div class="surface">${NEAR.map((r,i)=>`<div class="near-row ${state.near===i?'sel':''}" style="font-size:${r[2]}px" onclick="setNear(${i})">${r[1]}<div class="rowtag" style="letter-spacing:.1em">${r[0]}</div></div>`).join('')}</div>
  <div class="meta">Reveals presbyopia, the reading change after 45</div></div>`;
function setNear(i){ state.near=i; animateChip(); flash('Near: '+NEAR[i][0], i>=3?'Excellent up-close vision.':'A common reading change, very fixable.', next); }

/* clinical context (lead quality + doctor value) */
screens[8]=()=>`<div class="stagger"><div class="eyebrow">For your specialist</div><h1>Anything we<br>should <span class="it">know</span>?</h1>
  <div class="lede" style="margin-top:6px">Select any that apply. This goes straight to your doctor so your visit starts ahead.</div>
  <div class="chips">${CONTEXT.map((c,i)=>`<div class="chip ${state.context.includes(i)?'sel':''}" onclick="toggleCtx(${i})"><span class="e">${c[0]}</span>${c[1]}<span class="tick">&#10003;</span></div>`).join('')}</div>
  <div class="spacer"></div><button class="btn" onclick="next()" ${state.context.length?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;
function toggleCtx(i){ if(i===4){ state.context=state.context.includes(4)?[]:[4]; } else { state.context=state.context.filter(x=>x!==4); const at=state.context.indexOf(i); if(at>-1)state.context.splice(at,1); else state.context.push(i);} render(); }

/* club */
screens[9]=()=>`<div class="stagger"><div class="eyebrow">Almost there</div><h1>Where do you<br>call <span class="it">home</span>?</h1>
  <div class="lede" style="margin-top:6px">Your club helps us match you with the nearest specialist, and keep your visit close.</div>
  <div class="field"><label>Your club or facility</label>
    <input list="clubs" id="club" placeholder="Start typing&hellip;" value="${state.club}" oninput="state.club=this.value;tog('c9',this.value.length>1)"/>
    <datalist id="clubs"><option>Crooked Stick Golf Club</option><option>Conway Farms Golf Club</option><option>Butler National</option><option>Life Time North Shore</option><option>The Picklr</option><option>A.C. Nielsen Tennis Center</option><option>Carmel Racquet Club</option><option>Midtown Athletic Club</option><option>Cherry Creek Golf Club</option></datalist></div>
  <div class="reassure">&#128274;&nbsp;<div><b>Private.</b> Used only to find the office nearest you. Never shared, never spam.</div></div>
  <div class="spacer"></div><button class="btn" id="c9" onclick="next()" ${state.club.length>1?'':'disabled'}>Continue <span class="arrow">&rarr;</span></button></div>`;

/* contact */
screens[10]=()=>`<div class="stagger"><div class="eyebrow">Last step</div><h1>Where should we<br>send your <span class="it">report</span>?</h1>
  <div class="lede" style="margin-top:6px">Your Scouting Report is ready. Tell us where to deliver it.</div>
  <div class="field"><label>First name</label><input id="nm" placeholder="Jordan" value="${state.name}" oninput="state.name=this.value;chkContact()"/></div>
  <div class="field"><label>Email</label><input id="em" type="email" inputmode="email" placeholder="you@email.com" value="${state.email}" oninput="state.email=this.value;chkContact()"/></div>
  <div class="reassure">&#9201;&nbsp;<div>Instant results, plus a <b>complimentary in-clinic Athlete&rsquo;s Eye Test</b> with a specialist near your club.</div></div>
  <div class="spacer"></div><button class="btn" id="c10" onclick="next()" disabled>Reveal my Scouting Report <span class="arrow">&rarr;</span></button></div>`;
function chkContact(){ tog('c10', state.name.length>1 && /.+@.+\..+/.test(state.email)); }
function tog(id,ok){ const b=document.getElementById(id); if(b){b.disabled=!ok;} }

/* report */
function ctxFlags(){ const f=[]; if(state.context.includes(1))f.push('prior eye surgery'); if(state.context.includes(2))f.push('diabetes/glaucoma hx'); if(state.context.includes(3))f.push('dry eye'); return f.length?f.join(', '):'none flagged'; }
function correction(){ return state.context.includes(0)?'glasses / contacts / readers':'none'; }
function isCandidate(){
  if(state.context.includes(0)) return true;                 // wears glasses/contacts/readers => refractive or lens need
  if(totalScore() < Math.min(ageAvg(),78)) return true;       // overall below age-peer / floor
  if(state.near!=null && state.near<=1) return true;          // weak near => presbyopia
  if(state.contrast>0 && state.contrast<70) return true;      // weak contrast => lens/cataract
  if(state.acuity!=null && state.acuity<=1) return true;      // weak distance => refractive
  return false;
}
screens[11]=()=>{ const s=totalScore(), avg=ageAvg(), mins=8+Math.floor((state.club.length*7)%14);
  const cand=isCandidate(), p=PATHS[procedurePath()];
  const office = state.club ? ('the office ~'+mins+' min from '+state.club) : ('your nearest office, ~'+mins+' min away');
  const metrics=[['Distance acuity',acuityScore(),'Sharpness at range, your read on a fast ball.'],['Contrast',state.contrast,'Finding the ball in glare and low light.'],['Optical quality',state.clarity,'Astigmatism and overall crispness.'],['Near vision',nearScore(),'Reading the card, the menu, the rangefinder.']];
  const pathCard = cand
    ? `<div class="path" style="opacity:0;animation:rise .5s .55s forwards"><div class="tag">&#9670; Your path &middot; ${p.tag}</div><div class="t">${p.t}</div><p>${p.body}</p></div>`
    : `<div class="path" style="opacity:0;animation:rise .5s .55s forwards;background:linear-gradient(150deg,var(--green-soft),#fbf9f2);border-color:var(--green-tint)"><div class="tag" style="background:var(--green);color:#f3efe4">&#9733; Above standard</div><div class="t">Your eyes are reading at a high level.</div><p>You scored above the typical ${state.age||'player'} on the court, so surgery is not the move right now. That is the honest call most funnels never give you. Here is what is worth your time.</p></div>`;
  const docPath = cand ? p.tag : 'Performer, nurture + routine care';
  const actions = cand
    ? `<button class="btn" onclick="alert('Demo: books the complimentary in-clinic test and routes this income-qualified, candidacy-screened, proximity-matched lead with the full pre-screen and path: ${p.tag}.')">${p.cta} <span class="arrow">&rarr;</span></button>
  <div class="cta-prac">at ${office} &middot; about 20 minutes</div>`
    : `<button class="btn" onclick="alert('Meet the practice: comprehensive eye care, dry-eye treatment, sports-vision training, premium eyewear, and your future lens options.')">Meet the practice &amp; services <span class="arrow">&rarr;</span></button>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
    <button class="btn ghost" onclick="alert('Opens turn-by-turn directions to the nearest office.')">&#128205; Directions</button>
    <button class="btn ghost" onclick="alert('Shares the test so your partner can match up against your score. A built-in referral loop.')">&#129309; Challenge a partner</button></div>
  <button class="btn ghost" style="margin-top:10px" onclick="alert('Schedules a routine exam or connects you to the office for basic vision needs outside the AET.')">Book a routine exam or contact the office</button>
  <div class="cta-prac">${office}</div>`;
  return `<div>
  <div class="eyebrow" style="animation:rise .5s forwards">${state.name||'Athlete'}&rsquo;s Vision Scouting Report</div>
  <div class="ring-wrap" style="opacity:0;animation:rise .6s .1s forwards"><div class="ring">
    <svg width="170" height="170"><circle cx="85" cy="85" r="73" fill="none" stroke="#e7e1d4" stroke-width="11"/>
    <circle id="prog" cx="85" cy="85" r="73" fill="none" stroke="url(#g)" stroke-width="11" stroke-linecap="round" stroke-dasharray="459" stroke-dashoffset="459"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1E4636"/><stop offset="1" stop-color="#B0894B"/></linearGradient></defs></svg>
    <div class="num"><b id="bignum">0</b><span>Vision Score</span></div></div></div>
  <div class="acu-est" style="opacity:0;animation:rise .5s .28s forwards">Estimated distance acuity <b>${state.acuity!=null?ACUITY[state.acuity][0]:'&mdash;'}</b> &middot; your-age average <b>${avg}</b> &middot; tour pro <b>95</b></div>
  <div class="bars" style="opacity:0;animation:rise .5s .4s forwards">
    ${metrics.map(m=>`<div class="bar"><div class="bl"><span style="color:var(--ink)">${m[0]}</span><span>${m[1]} / 100</span></div>
      <div class="track"><i data-w="${m[1]}"></i><div class="pk" style="left:${avg}%"></div></div><div class="barnote">${m[2]}</div></div>`).join('')}</div>
  ${pathCard}
  <div class="docbox" style="opacity:0;animation:rise .5s .65s forwards"><div class="h">&#128203; Chair-ready pre-screen your doctor receives</div>
    <ul>
      <li>Sport &amp; club <b>${state.sport||'&mdash;'} &middot; ${state.club||'&mdash;'}</b></li>
      <li>Age band <b>${state.age||'&mdash;'}</b></li>
      <li>Estimated acuity <b>${state.acuity!=null?ACUITY[state.acuity][0]:'&mdash;'}</b></li>
      <li>Near / contrast <b>${nearScore()} / ${state.contrast}</b></li>
      <li>Current correction <b>${correction()}</b></li>
      <li>Flags <b>${ctxFlags()}</b></li>
      <li>Nearest office <b>~${mins} min</b></li>
      <li>Likely path <b>${docPath}</b></li>
    </ul></div>
  <div class="spacer" style="min-height:18px"></div>
  ${actions}
  <div class="disc">UX model &middot; not a clinical diagnosis &middot; concept by ajile Media for Dancecard</div></div>`; };

let rendering=false;
function render(){
  setBar(); animateChip();
  back.classList.toggle('show', step>0 && step<11);
  screenEl.classList.add('out');
  setTimeout(()=>{
    screenEl.innerHTML = screens[step]();
    screenEl.scrollTop = 0;
    screenEl.classList.remove('out');
    if(step===11) setTimeout(animateReport,80);
  }, rendering?180:0);
  rendering=true;
}
function animateReport(){
  const s=totalScore(), num=document.getElementById('bignum'); if(!num)return; let c=0;
  const t=setInterval(()=>{c+=Math.max(1,Math.round((s-c)/8));if(c>=s){c=s;clearInterval(t);}num.textContent=c;},30);
  const prog=document.getElementById('prog'), off=459-(459*(s/100));
  setTimeout(()=>prog.style.transition='stroke-dashoffset 1.3s cubic-bezier(.2,.8,.2,1)',20);
  setTimeout(()=>prog.style.strokeDashoffset=off,120);
  setTimeout(()=>document.querySelectorAll('.track>i').forEach(i=>i.style.width=i.dataset.w+'%'),520);
}
render();
</script>
</body>
</html>
